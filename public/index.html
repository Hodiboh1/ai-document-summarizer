<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Document Summarizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0015 0%, #0d0030 30%, #0a1628 60%, #001a1a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 44px;
      width: 100%;
      max-width: 720px;
      box-shadow: 0 0 80px rgba(139,92,246,0.15), 0 20px 60px rgba(0,0,0,0.5);
    }

    .welcome {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a78bfa, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 50%, #a1ffce 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .byline {
      font-size: 0.75rem;
      background: linear-gradient(90deg, #f59e0b, #fde68a, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      margin-bottom: 28px;
      opacity: 0.8;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 12px;
      color: #e2e8f0;
      padding: 16px;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
    }
    textarea:focus { border-color: #a78bfa; box-shadow: 0 0 20px rgba(167,139,250,0.15); }

    .divider {
      text-align: center;
      color: #475569;
      margin: 18px 0;
      font-size: 0.82rem;
      letter-spacing: 1px;
    }

    .file-label {
      display: block;
      border: 2px dashed rgba(139,92,246,0.35);
      border-radius: 12px;
      padding: 22px;
      text-align: center;
      cursor: pointer;
      color: #94a3b8;
      transition: all 0.3s;
      background: rgba(139,92,246,0.04);
    }
    .file-label:hover {
      border-color: #a78bfa;
      color: #e2e8f0;
      background: rgba(139,92,246,0.08);
      box-shadow: 0 0 20px rgba(167,139,250,0.1);
    }
    input[type="file"] { display: none; }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 15px;
      background: linear-gradient(135deg, #7c3aed, #2563eb, #0891b2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 30px rgba(124,58,237,0.4);
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .result {
      margin-top: 30px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 12px;
      padding: 24px;
      display: none;
    }
    .result h2 {
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 14px;
    }
    .result p { line-height: 1.8; color: #cbd5e1; white-space: pre-wrap; font-size: 0.95rem; }

    .loading {
      text-align: center;
      margin-top: 20px;
      display: none;
      font-size: 0.9rem;
      background: linear-gradient(90deg, #a78bfa, #38bdf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.72rem;
      color: #334155;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="welcome">✦ Welcome to</div>
    <h1>AI Document Summarizer</h1>
    <p class="subtitle">Paste text or upload a file — get a clean summary instantly.</p>
    <p class="byline">✦ Created by Hope Odiboh</p>

    <textarea id="textInput" placeholder="Paste your document text here..."></textarea>

    <div class="divider">— or upload a file —</div>

    <label class="file-label" id="fileLabel">
      <input type="file" id="fileInput" accept=".txt,.pdf" onchange="updateLabel(this)"/>
      Click to upload a .txt or .pdf file
    </label>

    <button onclick="summarize()" id="btn">⚡ Summarize</button>

    <div class="loading" id="loading">✦ Analyzing your document...</div>

    <div class="result" id="result">
      <h2>✨ Summary</h2>
      <p id="summaryText"></p>
    </div>

    <div class="footer">POWERED BY CLAUDE AI &nbsp;·&nbsp; BUILT &amp; DEPLOYED BY HOPE ODIBOH</div>
  </div>

  <script>
    function updateLabel(input) {
      const label = document.getElementById('fileLabel');
      label.childNodes[1].textContent = input.files[0]
        ? `✅ ${input.files[0].name}`
        : 'Click to upload a .txt or .pdf file';
    }

    async function summarize() {
      const text = document.getElementById('textInput').value.trim();
      const file = document.getElementById('fileInput').files[0];
      const btn = document.getElementById('btn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      if (!text && !file) {
        alert('Please paste text or upload a file first.');
        return;
      }

      btn.disabled = true;
      loading.style.display = 'block';
      result.style.display = 'none';

      try {
        let response;
        if (file) {
          const formData = new FormData();
          formData.append('file', file);
          response = await fetch('/summarize', { method: 'POST', body: formData });
        } else {
          response = await fetch('/summarize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
          });
        }

        const data = await response.json();
        document.getElementById('summaryText').textContent = data.summary || data.error;
        result.style.display = 'block';
      } catch (err) {
        alert('Something went wrong. Check your server.');
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
