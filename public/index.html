<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Document Summarizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.8rem; margin-bottom: 6px; color: #f8fafc; }
    p.subtitle { color: #94a3b8; margin-bottom: 28px; font-size: 0.95rem; }
    textarea {
      width: 100%;
      height: 180px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 14px;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #6366f1; }
    .divider {
      text-align: center;
      color: #475569;
      margin: 16px 0;
      font-size: 0.85rem;
    }
    .file-label {
      display: block;
      border: 2px dashed #334155;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      color: #94a3b8;
      transition: border-color 0.2s;
    }
    .file-label:hover { border-color: #6366f1; color: #e2e8f0; }
    input[type="file"] { display: none; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    button:disabled { background: #334155; cursor: not-allowed; }
    .result {
      margin-top: 28px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px;
      display: none;
    }
    .result h2 { font-size: 1rem; color: #6366f1; margin-bottom: 12px; }
    .result p { line-height: 1.7; color: #cbd5e1; white-space: pre-wrap; }
    .loading { text-align: center; color: #6366f1; margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 AI Document Summarizer</h1>
    <p class="subtitle">Paste text or upload a file — get a clean summary instantly.</p>

    <textarea id="textInput" placeholder="Paste your document text here..."></textarea>

    <div class="divider">— or upload a file —</div>

    <label class="file-label" id="fileLabel">
      <input type="file" id="fileInput" accept=".txt,.pdf" onchange="updateLabel(this)"/>
      Click to upload a .txt or .pdf file
    </label>

    <button onclick="summarize()" id="btn">Summarize</button>

    <div class="loading" id="loading">⏳ Summarizing your document...</div>

    <div class="result" id="result">
      <h2>✨ Summary</h2>
      <p id="summaryText"></p>
    </div>
  </div>

  <script>
    function updateLabel(input) {
      const label = document.getElementById('fileLabel');
      label.childNodes[1].textContent = input.files[0]
        ? `✅ ${input.files[0].name}`
        : 'Click to upload a .txt or .pdf file';
    }

    async function summarize() {
      const text = document.getElementById('textInput').value.trim();
      const file = document.getElementById('fileInput').files[0];
      const btn = document.getElementById('btn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      if (!text && !file) {
        alert('Please paste text or upload a file first.');
        return;
      }

      btn.disabled = true;
      loading.style.display = 'block';
      result.style.display = 'none';

      try {
        let response;
        if (file) {
          const formData = new FormData();
          formData.append('file', file);
          response = await fetch('/summarize', { method: 'POST', body: formData });
        } else {
          response = await fetch('/summarize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
          });
        }

        const data = await response.json();
        document.getElementById('summaryText').textContent = data.summary || data.error;
        result.style.display = 'block';
      } catch (err) {
        alert('Something went wrong. Check your server.');
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }
  </script>
</body>
</html>
